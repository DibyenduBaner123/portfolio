<!DOCTYPE html>
<html>
<head>
    <title>Place a Bid</title>
</head>
<body>
    <h2>Place Your Bid</h2>

    <form action="AuctionServlet" method="post">
        Item ID: <input type="number" name="item_id" required><br><br>
        Bidder Name: <input type="text" name="bidder" required><br><br>
        Bid Amount: <input type="number" name="bid_amount" required><br><br>

        <input type="submit" value="Submit Bid">
    </form>

</body>
</html>
