<!DOCTYPE html>

<head>
<title>Online Auction</title>
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Auction</title>
</head>
<body>
<h1>Welcome to the Online Auction</h1>
<form action="AuctionServlet" method="POST">
<h3>Place Your Bid</h3>
<label for="itemId">Item ID:</label>
<input type="text" id="itemId" name="itemId" required><br><br>
<label for="bidderName">Your Name:</label>
<input type="text" id="bidderName" name="bidderName" required><br><br>
<label for="bidAmount">Bid Amount:</label>
<input type="number" id="bidAmount" name="bidAmount" required><br><br>
<button type="submit">Submit Bid</button>
</form>
</body>
</html>
